game-settings:
  proxy-mode:
    enabled: true
    auto-join: true
    silent-arena-messages: true
    lock-weather: true
    kick-on-finish: true
    finish-kick-delay: 8
  allow-victory-before-completing-game: false
  give-blindness-in-game-3: true
  per-arena-chat: true
  send-player-to-lobby-on-join: true
  spawn-fireworks-on-win: true
  disable-fire-spread: true
  disable-ice-snow-melt: true
  disable-advancement-announcements: true
  min-players: 10
  force-start-min-players: 2
  max-players: 350
  starting-time: 30
  finishing-time: 5
  tug-of-war-win-distance: 20
  tug-of-war-pull-cooldown-ms: 150
  tug-of-war-pull-power: 3
  tug-of-war-sneak-pull-power: 5
  tug-of-war-sudden-death-time: 15
  mingle-rounds: 5
  mingle-round-time: 30
  mingle-vote-enabled: true
  mingle-skip-vote-percent: 50
  mingle-min-group-size: 3
  mingle-max-group-size: 10
  mingle-quick-room-radius: 3
  mingle-quick-room-height: 4
  hide-and-seek-hide-time: 5
  jump-rope-min-sweep-delay: 2
  jump-rope-max-sweep-delay: 5
  jump-rope-warning-time: 3
  sky-squid-round-time: 900
  sky-squid-final-round-time: 600
  game-time:
    "1": 60
    "3": 60
    "4": 600
    "5": 120
    "6": 300
    "8": 180
    "10": 1800
    "11": 0
    "12": 180
    "13": 0
  rewards:
  - ""
  sounds:
    player-loss-game: CAT_HIT
    player-pass-game: LEVEL_UP
    player-death: EXPLODE
    arena-starting: CLICK
    arena-countdown: NOTE_PLING
    arena-start: ORB_PICKUP
    green-light: GHAST_MOAN
    red-light: BLAZE_HIT
    glass-break: GLASS
  # For 1.13+
  # sounds:
  #    player-loss-game: ENTITY_CAT_HURT
  #    player-pass-game: ENTITY_PLAYER_LEVELUP
  #    player-death: ENTITY_GENERIC_EXPLODE
  #    arena-starting: UI_BUTTON_CLICK
  #    arena-countdown: BLOCK_NOTE_BLOCK_PLING
  #    arena-start: ENTITY_EXPERIENCE_ORB_PICKUP
  #    green-light: ENTITY_GHAST_AMBIENT
  #    red-light: ENTITY_BLAZE_HURT
  #    grass-break: BLOCK_GLASS_BREAK

